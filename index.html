<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADMAX Futuristic AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #020617, #020617, #000);
            color: white;
            overflow: hidden;
        }

        /* Neon grid background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,120,0,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,120,0,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* Floating Anime visuals */
        .anime {
            position: fixed;
            width: 100px;
            opacity: 0.95;
            animation: float 6s ease-in-out infinite;
        }

        .anime:nth-child(1) { top: 10%; left: 4%; animation-delay: 0s; }
        .anime:nth-child(2) { top: 70%; left: 85%; animation-delay: 1s; }
        .anime:nth-child(3) { top: 35%; left: 90%; animation-delay: 2s; }
        .anime:nth-child(4) { top: 80%; left: 10%; animation-delay: 3s; }
        .anime:nth-child(5) { top: 20%; left: 50%; animation-delay: 1.5s; }
        .anime:nth-child(6) { top: 60%; left: 25%; animation-delay: 2.5s; }

        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.3s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dot {
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background-color: orange;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>

<body class="flex items-center justify-center h-screen p-4">

    <!-- Floating MADMAX visuals -->
    <img src="https://i.imgur.com/Jp9Z6sP.png" class="anime">
    <img src="https://i.imgur.com/LK7sY3S.png" class="anime">
    <img src="https://i.imgur.com/4ZQZ4Zl.png" class="anime">
    <img src="https://i.imgur.com/ONn3G0J.png" class="anime">

    <!-- Doraemon Anime Characters -->
    <img src="https://upload.wikimedia.org/wikipedia/en/0/0f/Doraemon_character.png" class="anime">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/5a/NobitaNobi.png" class="anime">

    <!-- Chat Container -->
    <div class="flex flex-col w-full max-w-2xl h-[85vh] bg-black/60 backdrop-blur-2xl rounded-2xl shadow-[0_0_25px_orange] border border-orange-500 overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-orange-500 sticky top-0 bg-black/70 z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center font-bold text-black">MX</div>
                <div>
                    <h1 class="font-semibold text-orange-400 text-lg font-orbitron">MADMAX AI</h1>
                    <span class="text-xs text-green-400">Wasteland Online</span>
                </div>
            </div>
            <button onclick="clearChat()" class="text-sm text-orange-400 hover:text-orange-600">Clear</button>
        </div>

        <!-- Chat Messages -->
        <div id="chat" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 scrollbar-hide"></div>

        <!-- Input -->
        <div class="p-4 border-t border-orange-500 bg-black/70">
            <form id="chat-form" class="flex gap-2">
                <textarea id="user-input" rows="1" placeholder="Talk to MADMAX AI..."
                    class="flex-1 px-4 py-3 rounded-2xl bg-black text-white border border-orange-400 focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none"></textarea>
                <button type="submit"
                    class="bg-orange-500 hover:bg-orange-600 text-black rounded-2xl px-6 py-3 font-semibold">Send</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat');
        const API_URL = 'http://127.0.0.1:5000/chat';

        addMessage("🔥 MADMAX AI activated. Doraemon joined the wasteland.", 'bot');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            userInput.value = '';

            const typingId = addTypingIndicator();
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.text();
                removeTypingIndicator(typingId);
                addMessage(data, 'bot');

            } catch (err) {
                removeTypingIndicator(typingId);
                addMessage("Error: Backend not connected.", 'error');
                console.error(err);
            }
        });

        function addMessage(text, sender) {
            const container = document.createElement('div');
            container.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} fade-in`;

            const bubble = document.createElement('div');
            bubble.className = `p-3 max-w-[70%] break-words rounded-2xl ${sender === 'user'
                    ? 'bg-orange-500 text-black rounded-tr-none'
                    : sender === 'error'
                        ? 'bg-red-100 text-red-600'
                        : 'bg-black text-orange-300 border border-orange-500 rounded-tl-none'}`;
            bubble.innerText = text;

            container.appendChild(bubble);
            chatContainer.appendChild(container);
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function addTypingIndicator() {
            const container = document.createElement('div');
            container.className = 'flex gap-2 items-center fade-in';
            container.id = 'typing';

            const dots = document.createElement('div');
            dots.className = 'flex gap-1 p-2 bg-black rounded-2xl border border-orange-500';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dots.appendChild(dot);
            }

            container.appendChild(dots);
            chatContainer.appendChild(container);
            container.scrollIntoView({ behavior: 'smooth' });

            return container.id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            addMessage("System reset. Ready.", 'bot');
        }
    </script>

</body>

</html>
